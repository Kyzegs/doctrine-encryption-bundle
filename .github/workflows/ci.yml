name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  compatibility:
    name: PHP ${{ matrix.php }} / Symfony ${{ matrix.symfony }} / ORM ${{ matrix.orm }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.2'
            symfony: '6.4.*'
            orm: '^2.20'
            doctrine_bundle: '^2.12'
            composer_flags: '--prefer-lowest'
          - php: '8.3'
            symfony: '7.4.*'
            orm: '^3.2'
            doctrine_bundle: '^2.18'
            composer_flags: ''
          - php: '8.4'
            symfony: '8.0.*'
            orm: '^3.2'
            doctrine_bundle: '^2.18'
            composer_flags: ''
          - php: '8.5'
            symfony: '8.0.*'
            orm: '^3.6'
            doctrine_bundle: '^2.18'
            composer_flags: ''

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          extensions: mbstring, openssl, pdo_sqlite
          tools: flex

      - name: Select dependency versions
        run: composer require --no-update "doctrine/orm:${{ matrix.orm }}" "doctrine/doctrine-bundle:${{ matrix.doctrine_bundle }}"

      - name: Install dependencies
        env:
          SYMFONY_REQUIRE: ${{ matrix.symfony }}
        run: composer update --prefer-dist --no-progress --no-interaction ${{ matrix.composer_flags }}

      - run: composer validate --strict
      - run: composer test

  quality:
    name: Quality and security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: pcov
          extensions: mbstring, openssl, pdo_sqlite

      - run: composer update --prefer-dist --no-progress --no-interaction
      - run: composer validate --strict
      - run: composer audit
      - run: composer analyse
      - run: composer cs:check
      - run: composer rector:check
      - run: vendor/bin/phpunit --coverage-text
